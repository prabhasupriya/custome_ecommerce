services:
  data-science-app:
    build: .
    container_name: ecommerce-churn-prediction
    # ADDED PORTS: This is required to access your Streamlit UI
    ports:
      - "8501:8501"
      - "8000:8000"
    volumes:
      - .:/app
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
    working_dir: /app
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
    stdin_open: true
    tty: true
    